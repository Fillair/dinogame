<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
  />
  <title>Dino Game</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: #eee;
      font-family: monospace;
      min-height: 100%;
    }

    body {
      display: flex;
      justify-content: center;
      padding: 12px;
    }

    .app {
      width: 100%;
      max-width: 1000px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }

    .game-wrap {
      width: 100%;
      background: #fff;
      border: 2px solid #000;
      overflow: hidden;
      border-radius: 8px;
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      background: #fff;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    #controls {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      background: #fff;
      border: 2px solid #000;
      border-radius: 8px;
      padding: 12px;
    }

    .control {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .control-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-size: 14px;
    }

    .control-value {
      white-space: nowrap;
    }

    #controls input[type="range"] {
      width: 100%;
      cursor: pointer;
    }

    #controls input:disabled {
      filter: grayscale(1);
      opacity: 0.45;
      cursor: not-allowed;
    }

    .hint {
      width: 100%;
      text-align: center;
      font-size: 13px;
      color: #333;
    }

    #leaderboard {
      width: 100%;
      background: #fff;
      border: 2px solid #000;
      border-radius: 8px;
      padding: 12px;
    }

    #leaderboard h3 {
      margin: 0 0 12px 0;
      font-size: 20px;
    }

    .save-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    #playerName {
      flex: 1 1 180px;
      min-width: 160px;
      padding: 10px;
      border: 2px solid #000;
      border-radius: 6px;
      font-family: monospace;
      font-size: 14px;
      background: #fff;
    }

    #saveScoreBtn {
      padding: 10px 14px;
      border: 2px solid #000;
      border-radius: 6px;
      background: #ddd;
      font-family: monospace;
      font-size: 14px;
      cursor: not-allowed;
    }

    #saveScoreBtn.enabled {
      background: #fff;
      cursor: pointer;
    }

    #saveHint {
      font-size: 13px;
      color: #333;
      margin-bottom: 10px;
      min-height: 18px;
    }

    .table-wrap {
      overflow-x: auto;
    }

    .first-place {
      color: gold;
      font-weight: bold;
    }

    .second-place {
      color: silver;
      font-weight: bold;
    }

    .third-place {
      color: #cd7f32;
      font-weight: bold;
    }

    #leaderboard table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    #leaderboard th,
    #leaderboard td {
      text-align: left;
      padding: 8px;
      border-bottom: 1px solid #ddd;
    }

    #leaderboard th:nth-child(1),
    #leaderboard td:nth-child(1) {
      width: 50px;
    }

    #leaderboard th:nth-child(3),
    #leaderboard td:nth-child(3) {
      width: 90px;
    }

    @media (min-width: 700px) {
      #controls {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="game-wrap">
      <canvas id="game" width="1000" height="500"></canvas>
    </div>

    <div id="controls">
      <div class="control">
        <div class="control-header">
          <label for="dinoSize">Размер динозавра</label>
          <span class="control-value" id="dinoSizeValue">1.0</span>
        </div>
        <input id="dinoSize" type="range" min="0.5" max="2" step="0.1" value="1" />
      </div>

      <div class="control">
        <div class="control-header">
          <label for="obstacleSize">Размер препятствий</label>
          <span class="control-value" id="obstacleSizeValue">1.0</span>
        </div>
        <input id="obstacleSize" type="range" min="0.5" max="2" step="0.1" value="1" />
      </div>

      <div class="control">
        <div class="control-header">
          <label for="speed">Скорость игры</label>
          <span class="control-value" id="speedValue">12</span>
        </div>
        <input id="speed" type="range" min="2" max="20" step="1" value="12" />
      </div>

      <div class="control">
        <div class="control-header">
          <label for="jump">Высота прыжка</label>
          <span class="control-value" id="jumpValue">20</span>
        </div>
        <input id="jump" type="range" min="10" max="30" step="1" value="20" />
      </div>

      <div class="control">
        <div class="control-header">
          <label for="spawn">Плотность препятствий</label>
          <span class="control-value" id="spawnValue">1.00</span>
        </div>
        <input id="spawn" type="range" min="0.1" max="2" step="0.05" value="1" />
      </div>
    </div>

    <div class="hint">Тап по игре: старт, прыжок, рестарт</div>

    <div id="leaderboard">
      <h3>Лучшие результаты</h3>

      <div class="save-row">
        <input
          id="playerName"
          type="text"
          maxlength="20"
          placeholder="Ваше имя"
          autocomplete="nickname"
        />
        <button id="saveScoreBtn" disabled>Сохранить результат</button>
      </div>

      <div id="saveHint">Сохранение станет доступно после окончания игры</div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Имя</th>
              <th>Очки</th>
              <th>Дата</th>
            </tr>
          </thead>
          <tbody id="scoreTableBody">
            <tr>
              <td colspan="4">Загрузка...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const SHEET_API_URL =
      "https://script.google.com/macros/s/AKfycbyui5yPDEYGwovVEUuQ82IjgIDqumjlOLC1-g9ofuffUQd53FGLE5sicY_cQcgnWkfX/exec";

    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const STATE_WAIT = "wait";
    const STATE_PLAY = "play";
    const STATE_OVER = "over";
    let gameState = STATE_WAIT;

    const BASE_FRAME_TIME = 1000 / 60;
    const GAME_TIME_SCALE = 1.5;
    const GROUND_Y = 400;
    const PTERO_Y = [GROUND_Y - 60, GROUND_Y - 120];

    const settings = {
      dinoScale: 1,
      obstacleScale: 1,
      speed: 8,
      jumpHeight: 20,
      spawnDensity: 0.5,
      gravity: 20 / 35
    };

    const dinoSize = document.getElementById("dinoSize");
    const obstacleSize = document.getElementById("obstacleSize");
    const speed = document.getElementById("speed");
    const jump = document.getElementById("jump");
    const spawn = document.getElementById("spawn");

    const dinoSizeValue = document.getElementById("dinoSizeValue");
    const obstacleSizeValue = document.getElementById("obstacleSizeValue");
    const speedValue = document.getElementById("speedValue");
    const jumpValue = document.getElementById("jumpValue");
    const spawnValue = document.getElementById("spawnValue");

    const playerNameInput = document.getElementById("playerName");
    const saveScoreBtn = document.getElementById("saveScoreBtn");
    const saveHint = document.getElementById("saveHint");
    const scoreTableBody = document.getElementById("scoreTableBody");
    const sliders = document.querySelectorAll("#controls input");

    const images = {};
    const imageNames = ["dino", "cactus", "pterodactile", "ground"];

    let loadedImages = 0;
    let lastTime = 0;
    let scoreSavedForCurrentRun = false;

    let dino = {};
    let obstacles = [];
    let groundX = 0;
    let scoreValue = 0;
    let nextSpawnDistance = 0;

    let dinoFrame = 0;
    let dinoFrameTimer = 0;
    let pteroFrame = 0;
    let pteroFrameTimer = 0;

    let activeSessionId = null;
    let activeSessionStartedAtIso = null;
    let localGameStartPerf = 0;
    let hasStartedSession = false;

    settings.spawnDensity = parseFloat(spawn.value);
    settings.speed = parseFloat(speed.value);
    settings.dinoScale = parseFloat(dinoSize.value);
    settings.obstacleScale = parseFloat(obstacleSize.value);
    settings.jumpHeight = parseFloat(jump.value);
    settings.gravity = settings.jumpHeight / 35;
    updateSliderLabels();

    function updateSliderLabels() {
      dinoSizeValue.textContent = settings.dinoScale.toFixed(1);
      obstacleSizeValue.textContent = settings.obstacleScale.toFixed(1);
      speedValue.textContent = settings.speed;
      jumpValue.textContent = settings.jumpHeight;
      spawnValue.textContent = settings.spawnDensity.toFixed(2);
    }

    function setControlsEnabled(enabled) {
      sliders.forEach((s) => {
        s.disabled = !enabled;
      });
    }

    function updateSaveButtonState() {
      const canSave =
        gameState === STATE_OVER &&
        !scoreSavedForCurrentRun &&
        playerNameInput.value.trim().length > 0 &&
        !!activeSessionId &&
        hasStartedSession;

      saveScoreBtn.disabled = !canSave;
      saveScoreBtn.classList.toggle("enabled", canSave);
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatDate(dateString) {
      const d = new Date(dateString);
      if (Number.isNaN(d.getTime())) return "-";
      return d.toLocaleString("ru-RU");
    }

    function getDinoWidth() {
      return (dino.w * settings.dinoScale) / 2;
    }

    function getDinoHeight() {
      return (dino.h * settings.dinoScale) / 2;
    }

    function drawCenteredText(lines, startY, lineHeight = 30) {
      ctx.textAlign = "center";
      lines.forEach((line, index) => {
        ctx.fillText(line, canvas.width / 2, startY + index * lineHeight);
      });
    }

    function resetNextSpawnDistance() {
      const density = settings.spawnDensity;
      const minGap = 350 / density;
      const maxGap = 650 / density;
      nextSpawnDistance = minGap + Math.random() * (maxGap - minGap);
    }

    async function createGameSession() {
      const response = await fetch(`${SHEET_API_URL}?action=start`, {
        method: "GET",
        cache: "no-store"
      });

      const text = await response.text();
      const result = JSON.parse(text);

      if (!result.ok || !result.sessionId) {
        throw new Error(result.error || "Не удалось создать игровую сессию");
      }

      activeSessionId = result.sessionId;
      activeSessionStartedAtIso = result.startedAt || null;
      hasStartedSession = true;
      localGameStartPerf = performance.now();
      updateSaveButtonState();
    }

    async function loadLeaderboard() {
      scoreTableBody.innerHTML = `
        <tr>
          <td colspan="4">Загрузка...</td>
        </tr>
      `;

      try {
        const response = await fetch(SHEET_API_URL, {
          method: "GET",
          cache: "no-store"
        });

        const text = await response.text();
        const result = JSON.parse(text);

        if (!result.ok) {
          throw new Error(result.error || "Ошибка загрузки");
        }

        if (!result.scores || result.scores.length === 0) {
          scoreTableBody.innerHTML = `
            <tr>
              <td colspan="4">Пока нет результатов</td>
            </tr>
          `;
          return;
        }

        scoreTableBody.innerHTML = result.scores
        .map((item, index) => {
          let className = '';
          if (index === 0) className = 'first-place';
          else if (index === 1) className = 'second-place';
          else if (index === 2) className = 'third-place';

          return `
            <tr class="${className}">
              <td>${index + 1}</td>
              <td>${escapeHtml(item.name)}</td>
              <td>${item.score}</td>
              <td>${formatDate(item.date)}</td>
            </tr>
          `;
        })
        .join("");
      } catch (error) {
        console.error("Ошибка загрузки таблицы:", error);
        scoreTableBody.innerHTML = `
          <tr>
            <td colspan="4">Не удалось загрузить таблицу</td>
          </tr>
        `;
      }
    }

    async function saveScore() {
      if (gameState !== STATE_OVER || scoreSavedForCurrentRun) return;
      if (!activeSessionId || !hasStartedSession) return;

      const name = playerNameInput.value.trim();
      if (!name) return;

      const durationMs = Math.max(
        0,
        Math.round(performance.now() - localGameStartPerf)
      );

      saveScoreBtn.disabled = true;
      saveScoreBtn.classList.remove("enabled");
      saveScoreBtn.textContent = "Сохранение...";

      try {
        const response = await fetch(SHEET_API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "text/plain;charset=utf-8"
          },
          body: JSON.stringify({
            sessionId: activeSessionId,
            name,
            score: scoreValue,
            durationMs
          })
        });

        const text = await response.text();
        const result = JSON.parse(text);

        if (!result.ok) {
          throw new Error(result.error || "Ошибка сохранения");
        }

        scoreSavedForCurrentRun = true;
        saveHint.textContent = "Результат сохранён";
        saveScoreBtn.textContent = "Сохранено";

        await loadLeaderboard();
      } catch (error) {
        console.error("Ошибка сохранения:", error);
        saveHint.textContent = "Ошибка сохранения: " + error.message;
        saveScoreBtn.textContent = "Сохранить результат";
        updateSaveButtonState();
      }
    }

    function jumpDino() {
      if (!dino.jumping) {
        dino.vy = -settings.jumpHeight;
        dino.jumping = true;
      }
    }

    async function startGame() {
      if (gameState === STATE_PLAY) return;

      saveHint.textContent = "Подготовка игры...";
      try {
        await createGameSession();
      } catch (error) {
        saveHint.textContent = "Не удалось начать игру: " + error.message;
        return;
      }

      reset();
      scoreSavedForCurrentRun = false;
      saveHint.textContent = "Игра идёт. Сохранение будет доступно после окончания";
      saveScoreBtn.textContent = "Сохранить результат";
      gameState = STATE_PLAY;
      setControlsEnabled(false);
      updateSaveButtonState();
    }

    function reset() {
      obstacles = [];
      groundX = 0;
      scoreValue = 0;
      dinoFrame = 0;
      dinoFrameTimer = 0;
      pteroFrame = 0;
      pteroFrameTimer = 0;

      dino.y = GROUND_Y - getDinoHeight();
      dino.vy = 0;
      dino.jumping = false;

      resetNextSpawnDistance();
      updateSaveButtonState();
    }

    function spawnObstacle() {
      const scale = settings.obstacleScale;
      const isPtero = Math.random() < 0.3;

      obstacles.push(
        isPtero
          ? {
              type: "ptero",
              x: canvas.width + 50,
              y: PTERO_Y[(Math.random() * 2) | 0],
              w: 80 * scale,
              h: 42 * scale,
              passed: false
            }
          : {
              type: "cactus",
              x: canvas.width + 50,
              y: GROUND_Y - 50 * scale,
              w: 33 * scale,
              h: 50 * scale,
              passed: false
            }
      );
    }

    function handleGameAction() {
      if (gameState === STATE_WAIT || gameState === STATE_OVER) {
        startGame();
      } else if (gameState === STATE_PLAY) {
        jumpDino();
      }
    }

    function update(delta, deltaMs) {
      if (gameState !== STATE_PLAY) return;

      dino.vy += settings.gravity * delta;
      dino.y += dino.vy * delta;

      if (dino.y >= GROUND_Y - getDinoHeight()) {
        dino.y = GROUND_Y - getDinoHeight();
        dino.vy = 0;
        dino.jumping = false;
      }

      const worldMove = settings.speed * delta;

      groundX -= worldMove;
      if (groundX <= -images.ground.width) {
        groundX += images.ground.width;
      }

      obstacles.forEach((o) => {
        o.x -= worldMove;
      });

      obstacles = obstacles.filter((o) => o.x + o.w > -50);

      obstacles.forEach((o) => {
        if (!o.passed && o.x + o.w < dino.x) {
          scoreValue++;
          o.passed = true;
        }

        if (
          dino.x < o.x + o.w &&
          dino.x + getDinoWidth() > o.x &&
          dino.y < o.y + o.h &&
          dino.y + getDinoHeight() > o.y
        ) {
          gameState = STATE_OVER;
          setControlsEnabled(true);
          saveHint.textContent = "Игра окончена. Введите имя и сохраните результат";
          updateSaveButtonState();
        }
      });

      nextSpawnDistance -= worldMove;

      if (nextSpawnDistance <= 0) {
        const lastObstacle = obstacles[obstacles.length - 1];
        const enoughDistance = !lastObstacle || lastObstacle.x < canvas.width - 80;

        if (enoughDistance) {
          spawnObstacle();
          resetNextSpawnDistance();
        }
      }

      dinoFrameTimer += deltaMs;
      if (dinoFrameTimer >= 12 * BASE_FRAME_TIME) {
        dinoFrame = (dinoFrame + 1) % 2;
        dinoFrameTimer = 0;
      }

      pteroFrameTimer += deltaMs;
      if (pteroFrameTimer >= 20 * BASE_FRAME_TIME) {
        pteroFrame = (pteroFrame + 1) % 2;
        pteroFrameTimer = 0;
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (images.ground.complete && images.ground.naturalWidth) {
        ctx.drawImage(images.ground, groundX, GROUND_Y);
        ctx.drawImage(images.ground, groundX + images.ground.width, GROUND_Y);
      }

      if (images.dino.complete && images.dino.naturalWidth) {
        ctx.drawImage(
          images.dino,
          dinoFrame * dino.w,
          0,
          dino.w,
          dino.h,
          dino.x,
          dino.y,
          getDinoWidth(),
          getDinoHeight()
        );
      }

      obstacles.forEach((o) => {
        if (o.type === "ptero") {
          if (images.pterodactile.complete && images.pterodactile.naturalWidth) {
            ctx.drawImage(
              images.pterodactile,
              pteroFrame * 80,
              0,
              80,
              42,
              o.x,
              o.y,
              o.w,
              o.h
            );
          }
        } else {
          if (images.cactus.complete && images.cactus.naturalWidth) {
            ctx.drawImage(images.cactus, o.x, o.y, o.w, o.h);
          }
        }
      });

      ctx.fillStyle = "#000";
      ctx.font = "20px monospace";
      ctx.textAlign = "left";
      ctx.fillText("Очки: " + scoreValue, 10, 30);

      ctx.font = "24px monospace";

      if (gameState === STATE_WAIT) {
        drawCenteredText(["НАЖМИТЕ НА ИГРУ", "ЧТОБЫ НАЧАТЬ"], 110, 34);
      }

      if (gameState === STATE_OVER) {
        drawCenteredText(
          [
            "ИГРА ОКОНЧЕНА",
            "МОЖНО ИЗМЕНИТЬ НАСТРОЙКИ СНИЗУ",
            "НАЖМИТЕ НА ИГРУ, ЧТОБЫ НАЧАТЬ ЗАНОВО"
          ],
          90,
          34
        );
      }
    }

    function loop(time = 0) {
      if (!lastTime) {
        lastTime = time;
      }

      const rawDeltaMs = time - lastTime;
      const deltaMs = Math.min(rawDeltaMs, 33.333);
      const delta = (deltaMs / BASE_FRAME_TIME) * GAME_TIME_SCALE;

      lastTime = time;

      update(delta || GAME_TIME_SCALE, deltaMs || BASE_FRAME_TIME);
      draw();
      requestAnimationFrame(loop);
    }

    async function initGame() {
      dino = {
        x: 50,
        y: GROUND_Y,
        w: images.dino.width / 2,
        h: images.dino.height,
        vy: 0,
        jumping: false
      };

      dino.y = GROUND_Y - getDinoHeight();
      updateSliderLabels();
      updateSaveButtonState();
      await loadLeaderboard();
      requestAnimationFrame(loop);
    }

    dinoSize.addEventListener("input", (e) => {
      settings.dinoScale = +e.target.value;
      updateSliderLabels();

      if (gameState !== STATE_PLAY && dino.h) {
        dino.y = GROUND_Y - getDinoHeight();
      }
    });

    obstacleSize.addEventListener("input", (e) => {
      settings.obstacleScale = +e.target.value;
      updateSliderLabels();
    });

    speed.addEventListener("input", (e) => {
      settings.speed = +e.target.value;
      updateSliderLabels();
    });

    jump.addEventListener("input", (e) => {
      settings.jumpHeight = +e.target.value;
      settings.gravity = settings.jumpHeight / 35;
      updateSliderLabels();
    });

    spawn.addEventListener("input", (e) => {
      settings.spawnDensity = +e.target.value;
      updateSliderLabels();
      resetNextSpawnDistance();
    });

    playerNameInput.addEventListener("input", updateSaveButtonState);
    saveScoreBtn.addEventListener("click", saveScore);

    document.addEventListener("keydown", (e) => {
      if (e.code === "Space" || e.code === "ArrowUp") {
        e.preventDefault();
        handleGameAction();
      }
    });

    canvas.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      handleGameAction();
    });

    canvas.addEventListener(
      "touchstart",
      (e) => {
        e.preventDefault();
      },
      { passive: false }
    );

    setControlsEnabled(false);
    updateSliderLabels();
    updateSaveButtonState();

    imageNames.forEach((name) => {
      images[name] = new Image();
      images[name].src = "images/" + name + ".png";

      images[name].onload = () => {
        loadedImages++;
        if (loadedImages === imageNames.length) {
          initGame();
        }
      };

      images[name].onerror = () => {
        console.error("Не удалось загрузить картинку:", name);
      };
    });
  </script>
</body>
</html>
