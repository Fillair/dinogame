<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Dino Game</title>
<style>
  body {
    margin: 0;
    background: #eee;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: monospace;
  }

  canvas {
    background: #fff;
    border: 2px solid #000;
  }

  #controls {
    margin-left: 20px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    width: 260px;
  }

  #controls label {
    font-size: 14px;
  }

  #controls input {
    cursor: pointer;
  }

  #controls input:disabled {
    filter: grayscale(1);
    opacity: 0.4;
  }
</style>
</head>
<body>

<canvas id="game" width="1000" height="500"></canvas>

<div id="controls">
  <label for="dinoSize">Размер динозавра</label>
  <input id="dinoSize" type="range" min="0.5" max="2" step="0.1" value="1">

  <label for="obstacleSize">Размер препятствий</label>
  <input id="obstacleSize" type="range" min="0.5" max="2" step="0.1" value="1">

  <label for="speed">Скорость игры</label>
  <input id="speed" type="range" min="2" max="12" step="1" value="5">

  <label for="jump">Высота прыжка</label>
  <input id="jump" type="range" min="10" max="30" step="1" value="20">

  <label for="spawn">Шанс спавна</label>
  <input id="spawn" type="range" min="0.005" max="0.05" step="0.005" value="0.015">
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// === GAME STATES ===
const STATE_WAIT = "wait";
const STATE_PLAY = "play";
const STATE_OVER = "over";
let gameState = STATE_WAIT;

// === SETTINGS ===
const settings = {
  dinoScale: 1,
  obstacleScale: 1,
  speed: 5,
  jumpHeight: 20,      // ИНТУИТИВНО: больше = выше прыжок
  spawnChance: 0.015,
  gravity: 0.6
};

// === IMAGES ===
const images = {};
const imageNames = ["dino","cactus","pterodactile","ground"];
let loadedImages = 0;

imageNames.forEach(name => {
  images[name] = new Image();
  images[name].src = "images/" + name + ".png";
  images[name].onload = () => {
    loadedImages++;
    if (loadedImages === imageNames.length) initGame();
  };
});

// === CONSTS ===
const GROUND_Y = 400;

// === OBJECTS ===
let dino = {};
let obstacles = [];
let groundX = 0;
let score = 0;

// === ANIMATION ===
let dinoFrame = 0;
let dinoFrameTick = 0;
let pteroFrame = 0;
let pteroFrameTick = 0;
const PTERO_Y = [GROUND_Y - 60, GROUND_Y - 120];

// === CONTROLS ===
const sliders = document.querySelectorAll("#controls input");

function setControlsEnabled(enabled) {
  sliders.forEach(s => s.disabled = !enabled);
}
setControlsEnabled(false);

// === SLIDERS ===
dinoSize.oninput = e => settings.dinoScale = +e.target.value;
obstacleSize.oninput = e => settings.obstacleScale = +e.target.value;
speed.oninput = e => settings.speed = +e.target.value;
spawn.oninput = e => settings.spawnChance = +e.target.value;

jump.oninput = e => {
  settings.jumpHeight = +e.target.value;
  settings.gravity = settings.jumpHeight / 35;
};

// === INPUT ===
document.addEventListener("keydown", e => {
  if (e.code !== "Space") return;

  if (gameState === STATE_WAIT || gameState === STATE_OVER) {
    startGame();
  } else if (gameState === STATE_PLAY) {
    jumpDino();
  }
});

// === GAME LOGIC ===
function jumpDino() {
  if (!dino.jumping) {
    dino.vy = -settings.jumpHeight;
    dino.jumping = true;
  }
}

function startGame() {
  reset();
  gameState = STATE_PLAY;
  setControlsEnabled(false);
}

function reset() {
  obstacles = [];
  score = 0;
  groundX = 0;

  dino.y = GROUND_Y - getDinoHeight();
  dino.vy = 0;
  dino.jumping = false;
}

function spawnObstacle() {
  const scale = settings.obstacleScale;
  const isPtero = Math.random() < 0.3;

  obstacles.push(
    isPtero
      ? { type:"ptero", x:canvas.width+50, y:PTERO_Y[Math.random()*2|0], w:80*scale, h:42*scale, passed:false }
      : { type:"cactus", x:canvas.width+50, y:GROUND_Y-50*scale, w:33*scale, h:50*scale, passed:false }
  );
}

// === INIT ===
function initGame() {
  dino = {
    x: 50,
    y: GROUND_Y,
    w: images.dino.width / 2,
    h: images.dino.height,
    vy: 0,
    jumping: false
  };

  dino.y = GROUND_Y - getDinoHeight();
  loop();
}

function getDinoWidth() {
  return dino.w * settings.dinoScale / 2;
}
function getDinoHeight() {
  return dino.h * settings.dinoScale / 2;
}

// === UPDATE ===
function update() {
  if (gameState !== STATE_PLAY) return;

  dino.vy += settings.gravity;
  dino.y += dino.vy;

  if (dino.y >= GROUND_Y - getDinoHeight()) {
    dino.y = GROUND_Y - getDinoHeight();
    dino.vy = 0;
    dino.jumping = false;
  }

  groundX -= settings.speed;
  if (groundX <= -images.ground.width) groundX = 0;

  obstacles.forEach(o => o.x -= settings.speed);

  obstacles.forEach(o => {
    if (!o.passed && o.x + o.w < dino.x) {
      score++;
      o.passed = true;
    }
    if (
      dino.x < o.x + o.w &&
      dino.x + getDinoWidth() > o.x &&
      dino.y < o.y + o.h &&
      dino.y + getDinoHeight() > o.y
    ) {
      gameState = STATE_OVER;
      setControlsEnabled(true);
    }
  });

  if (Math.random() < settings.spawnChance) spawnObstacle();

  if (++dinoFrameTick > 12) {
    dinoFrame = (dinoFrame + 1) % 2;
    dinoFrameTick = 0;
  }
  if (++pteroFrameTick > 20) {
    pteroFrame = (pteroFrame + 1) % 2;
    pteroFrameTick = 0;
  }
}

// === DRAW ===
function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.drawImage(images.ground, groundX, GROUND_Y);
  ctx.drawImage(images.ground, groundX + images.ground.width, GROUND_Y);

  ctx.drawImage(
    images.dino,
    dinoFrame * dino.w, 0, dino.w, dino.h,
    dino.x, dino.y, getDinoWidth(), getDinoHeight()
  );

  obstacles.forEach(o => {
    if (o.type === "ptero") {
      ctx.drawImage(images.pterodactile, pteroFrame*80,0,80,42, o.x,o.y,o.w,o.h);
    } else {
      ctx.drawImage(images.cactus, o.x,o.y,o.w,o.h);
    }
  });

  ctx.fillStyle = "#000";
  ctx.font = "20px monospace";
  ctx.textAlign = "left";
  ctx.fillText("Очки: " + score, 10, 30);

  ctx.textAlign = "center";

  if (gameState === STATE_WAIT) {
    ctx.fillText("НАЖМИТЕ ПРОБЕЛ, ЧТОБЫ НАЧАТЬ", canvas.width/2, 100);
  }

  if (gameState === STATE_OVER) {
    ctx.fillText("ИГРА ОКОНЧЕНА", canvas.width/2, 80);
    ctx.fillText("МОЖЕТЕ ПОМЕНЯТЬ НАСТРОЙКИ", canvas.width/2, 110);
    ctx.fillText("НАЖМИТЕ ПРОБЕЛ, ЧТОБЫ НАЧАТЬ ЗАНОВО", canvas.width/2, 140);
  }
}

// === LOOP ===
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
</script>
</body>
</html>
